name: CI

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - synchronize
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4

      - run: pnpm install
      - run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4

      - run: pnpm install
      - run: pnpm test
